<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Stylized "N" with signal/buzz waves -->
  <rect x="4" y="8" width="40" height="40" rx="10" fill="url(#grad1)"/>
  
  <!-- Letter N inside the icon -->
  <path d="M14 38V18h3l12 14V18h3v20h-3L17 24v14h-3z" fill="white" font-weight="bold"/>
  
  <!-- Buzz signal waves -->
  <path d="M42 16c3-3 7-4 7 0s-4 3-7 0" stroke="url(#grad2)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M44 10c5-4 10-5 10 0s-5 4-10 0" stroke="url(#grad2)" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M46 5c6-4 12-5 12 0s-6 4-12 0" stroke="url(#grad2)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  
  <!-- "News" text -->
  <text x="62" y="38" font-family="'Quicksand', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#1a1a2e">
    News
  </text>
  
  <!-- "Buzz" text -->
  <text x="155" y="38" font-family="'Quicksand', 'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="url(#grad1)">
    Buzz
  </text>
  
  <!-- Subtle dot accent -->
  <circle cx="245" cy="35" r="4" fill="url(#grad2)"/>
</svg>
