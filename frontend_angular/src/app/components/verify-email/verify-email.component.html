<div class="verify-overlay" (click)="onOverlayClick($event)">
  <div class="verify-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closed.emit()">
      <mat-icon>close</mat-icon>
    </button>

    <h2 class="step-title">Check your email</h2>
    <p class="step-subtitle">We sent a verification code to {{ email }}</p>

    @if (isSending) {
      <div class="sending-row">
        <mat-spinner diameter="20"></mat-spinner>
        <span>Sending verification code...</span>
      </div>
    }

    @if (errorMessage) {
      <div class="error-msg">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>
    }

    <form (ngSubmit)="submitCode()">
      <div class="code-inputs">
        @for (digit of code; track $index) {
          <input
            type="text"
            maxlength="1"
            class="code-input"
            [id]="'verify-code-' + $index"
            [value]="digit"
            (input)="onCodeInput($index, $event)"
            (keydown)="onCodeKeydown($index, $event)"
          />
        }
      </div>
      <button type="submit" class="submit-btn" [disabled]="isSending || code.some(d => !d)">
        Verify Code
      </button>
    </form>
  </div>
</div>
