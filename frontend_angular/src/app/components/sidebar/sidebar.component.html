<!-- Hamburger menu toggle button -->
<button
  class="menu-toggle-btn"
  [class.dark]="theme.isDark()"
  (click)="toggleDrawer()"
>
  <mat-icon>menu</mat-icon>
</button>

<!-- Sidebar drawer -->
<nav
  class="sidebar-drawer"
  [class.open]="open"
  [class.collapsed]="!open"
  [class.dark]="theme.isDark()"
>
  <!-- Spacer for toolbar height -->
  <div class="toolbar-spacer"></div>

  <!-- Main navigation items -->
  <div class="nav-list">
    <div
      *ngFor="let item of navItems"
      class="nav-item"
      [class.active]="isActive(item.path)"
      [class.collapsed]="!open"
      [class.dark]="theme.isDark()"
      (click)="navigate(item.path)"
      [matTooltip]="!open ? item.title : ''"
      matTooltipPosition="right"
    >
      <div class="nav-icon" [class.collapsed]="!open">
        <mat-icon>{{ item.icon }}</mat-icon>
      </div>
      <span class="nav-label" *ngIf="open">{{ item.title }}</span>
    </div>
  </div>

  <!-- Bottom section -->
  <div class="bottom-section" [class.collapsed]="!open">
    <div class="divider-line" [class.dark]="theme.isDark()"></div>

    <!-- Theme toggle -->
    <div
      class="nav-item"
      [class.collapsed]="!open"
      [class.dark]="theme.isDark()"
      (click)="toggleTheme()"
      [matTooltip]="!open ? (theme.isDark() ? 'Light Mode' : 'Dark Mode') : ''"
      matTooltipPosition="right"
    >
      <div class="nav-icon" [class.collapsed]="!open">
        <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </div>
      <span class="nav-label" *ngIf="open">
        {{ theme.isDark() ? 'Light Mode' : 'Dark Mode' }}
      </span>
    </div>

    <!-- Logout -->
    <div
      class="nav-item logout-item"
      [class.collapsed]="!open"
      [class.dark]="theme.isDark()"
      (click)="logout()"
      [matTooltip]="!open ? 'Logout' : ''"
      matTooltipPosition="right"
    >
      <div class="nav-icon logout-icon" [class.collapsed]="!open" [class.dark]="theme.isDark()">
        <mat-icon>logout</mat-icon>
      </div>
      <span class="nav-label logout-label" [class.dark]="theme.isDark()" *ngIf="open">Logout</span>
    </div>
  </div>
</nav>
