<div class="search-results-page" [class.dark]="theme.isDark()">
  <!-- Search Bar -->
  <div class="search-wrapper">
    <div class="search-bar" [class.dark]="theme.isDark()">
      <mat-icon class="search-icon">search</mat-icon>
      <input
        type="text"
        placeholder="Search from given articles..."
        [(ngModel)]="searchQuery"
        class="search-input"
        [class.dark]="theme.isDark()"
      />
    </div>
  </div>

  <!-- Loading Skeletons -->
  <div *ngIf="isLoading" class="results-grid">
    <div *ngFor="let s of [1,2,3,4,5,6]" class="skeleton-card">
      <div class="skeleton-line short"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
    </div>
  </div>

  <!-- Results Grid -->
  <div *ngIf="!isLoading && filteredResults.length > 0" class="results-grid">
    <app-news-card
      *ngFor="let item of filteredResults"
      [title]="item.title"
      [link]="item.link"
      [time]="item.time || ''"
      [providerImg]="item.providerImg || ''"
      [providerName]="item.providerName || ''"
      [someText]="item.someText || ''"
      [showMute]="true"
    ></app-news-card>
  </div>

  <!-- Loading More -->
  <div *ngIf="loadingMore" class="results-grid">
    <div *ngFor="let s of [1,2]" class="skeleton-card">
      <div class="skeleton-line short"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line medium"></div>
      <div class="skeleton-line short"></div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && filteredResults.length === 0" class="empty-state">
    <mat-icon class="empty-icon">search_off</mat-icon>
    <p>No results found for "{{ query }}"</p>
  </div>
</div>
