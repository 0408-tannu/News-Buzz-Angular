<div class="profile-page" [class.dark]="theme.isDark()">
  <div *ngIf="isLoading" class="loading-container">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <div *ngIf="!isLoading">
    <!-- Profile Image -->
    <div class="profile-image-section">
      <img
        src="https://1.bp.blogspot.com/-4XH4gYWBqkc/X_fjW3OyqKI/AAAAAAAAFaY/Tg3RZ4lICOIwmliLKBcGkVSkpk0hdH-wwCLcBGAsYHQ/s1200/News.jpg"
        alt="Profile"
        class="profile-avatar"
        [class.dark]="theme.isDark()"
      />
    </div>

    <!-- Form Card -->
    <div class="profile-card" [class.dark]="theme.isDark()">
      <!-- Username -->
      <div class="form-group">
        <label class="form-label" [class.dark]="theme.isDark()">User Name</label>
        <input
          type="text"
          class="form-input"
          [class.dark]="theme.isDark()"
          placeholder="Enter User name"
          [(ngModel)]="username"
        />
      </div>

      <!-- First Name + Age -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" [class.dark]="theme.isDark()">First Name</label>
          <input
            type="text"
            class="form-input"
            [class.dark]="theme.isDark()"
            placeholder="Enter first name"
            [(ngModel)]="firstName"
          />
        </div>
        <div class="form-group">
          <label class="form-label" [class.dark]="theme.isDark()">Age</label>
          <input
            type="number"
            class="form-input"
            [class.dark]="theme.isDark()"
            placeholder="Enter age"
            [(ngModel)]="age"
          />
        </div>
      </div>

      <!-- Last Name + Phone -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" [class.dark]="theme.isDark()">Last Name</label>
          <input
            type="text"
            class="form-input"
            [class.dark]="theme.isDark()"
            placeholder="Enter last name"
            [(ngModel)]="lastName"
          />
        </div>
        <div class="form-group">
          <label class="form-label" [class.dark]="theme.isDark()">Phone No.</label>
          <input
            type="tel"
            class="form-input"
            [class.dark]="theme.isDark()"
            placeholder="Enter phone number"
            [(ngModel)]="phoneNo"
          />
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" [class.dark]="theme.isDark()">Email</label>
        <input
          type="email"
          class="form-input"
          [class.dark]="theme.isDark()"
          placeholder="Enter email"
          [value]="email"
          readonly
        />
      </div>

      <!-- Topics -->
      <div class="form-group">
        <label class="form-label" [class.dark]="theme.isDark()">Topics</label>
        <div class="topics-input-row">
          <input
            type="text"
            class="form-input"
            [class.dark]="theme.isDark()"
            placeholder="Enter topics of interest"
            [(ngModel)]="newTopic"
            (keyup.enter)="addTopic()"
          />
          <button class="add-btn" [class.dark]="theme.isDark()" (click)="addTopic()">Add</button>
        </div>
        <div class="topics-list">
          <span *ngFor="let topic of topics" class="topic-badge" [class.dark]="theme.isDark()">
            {{ topic }}
            <mat-icon class="remove-icon" (click)="removeTopic(topic)">close</mat-icon>
          </span>
        </div>
      </div>

      <!-- Messages -->
      <div *ngIf="successMessage" class="message success">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="message error">{{ errorMessage }}</div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <button
          class="btn-update"
          [class.dark]="theme.isDark()"
          (click)="updateProfile()"
          [disabled]="isSaving"
        >
          <mat-spinner *ngIf="isSaving" diameter="20"></mat-spinner>
          <span *ngIf="!isSaving">Update Profile</span>
        </button>

        <button class="btn-password" [class.dark]="theme.isDark()" (click)="changePassword()">
          Change Password
        </button>
      </div>
    </div>
  </div>
</div>

@if (showResetPassword) {
  <app-reset-password (closed)="showResetPassword = false"></app-reset-password>
}
