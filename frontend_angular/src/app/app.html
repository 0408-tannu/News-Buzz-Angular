<div class="app-container" [class.dark-mode]="theme.isDark()">
  <!-- Sidebar -->
  <app-sidebar
    *ngIf="showNavSidebar"
    [open]="sidebarOpen()"
    (openChange)="sidebarOpen.set($event)"
  ></app-sidebar>

  <!-- Main content -->
  <main [style.marginLeft]="mainMarginLeft">
    <!-- Navbar -->
    <app-navbar
      *ngIf="showNavbar"
      [leftOffset]="mainMarginLeft"
    ></app-navbar>

    <!-- Page content -->
    <div
      class="page-content"
      [class.has-navbar]="showNavbar"
      [class.has-topicbar]="showNavbar && auth.isLoggedIn()"
      [class.auth-page]="isAuthRoute"
    >
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
